events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Route Audit Service APIs -> Node.js (Port 3000)
        location /api/audit/ {
            proxy_pass http://host.docker.internal:3000/api/audit/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route Feed Service APIs -> Node.js (Port 3000)
        location /api/feed/ {
            proxy_pass http://host.docker.internal:3000/api/feed/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket/Socket.io for Audit Service
        location /socket.io/ {
            proxy_pass http://host.docker.internal:3000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Route Core Service APIs -> Spring Boot (Port 8080)
        location /api/ {
            proxy_pass http://host.docker.internal:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 100M;
        }

        # Swagger API Docs paths (Optional)
        location /v3/api-docs/ {
            proxy_pass http://host.docker.internal:8080/v3/api-docs/;
            proxy_set_header Host $host;
        }
        
        location /swagger-ui/ {
            proxy_pass http://host.docker.internal:8080/swagger-ui/;
            proxy_set_header Host $host;
        }
    }
}
